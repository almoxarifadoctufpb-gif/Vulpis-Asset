<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vulpis Asset · Estude com Inteligência</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Roboto', sans-serif;
      background: #F5F5F5;
      color: #212121;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    /* Sidebar */
    .sidebar {
      width: 280px;
      background: #FFFFFF;
      display: flex;
      flex-direction: column;
      padding: 32px 20px;
      border-right: 1px solid #EEEEEE;
      box-shadow: 2px 0 12px rgba(0,0,0,0.02);
    }
    .logo-area {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 48px;
      padding-left: 8px;
    }
    .logo-icon {
      width: 44px; height: 44px;
      background: #F57C00;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 24px;
      overflow: hidden;
    }
    .logo-icon img { width: 100%; height: 100%; object-fit: cover; }
    .logo-text {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 1.5rem;
      color: #212121;
    }
    .nav-menu { flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border-radius: 16px;
      color: #5A5A5A;
      font-weight: 500;
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .nav-item i { width: 24px; font-size: 1.3rem; }
    .nav-item.active {
      background: #FEF0E6;
      color: #E65100;
      box-shadow: 0 4px 8px rgba(230,81,0,0.05);
    }
    .nav-item:hover:not(.active) { background: #F9F9F9; }

    /* Main Content */
    .main {
      flex: 1;
      overflow-y: auto;
      padding: 32px 40px;
      background: #F5F5F5;
    }

    /* Cards e elementos */
    .card {
      background: #FFFFFF;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.02);
      border: 1px solid #F0F0F0;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card:hover { box-shadow: 0 12px 28px rgba(0,0,0,0.04); }
    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      color: #5A5A5A;
      font-weight: 500;
    }
    .card-header i { font-size: 1.4rem; color: #F57C00; }
    .card-value {
      font-family: 'Poppins', sans-serif;
      font-size: 2.2rem;
      font-weight: 700;
      color: #212121;
    }
    .progress-bar {
      background: #E9E9E9;
      height: 10px;
      border-radius: 20px;
      margin: 16px 0 8px;
    }
    .progress-fill {
      height: 10px;
      border-radius: 20px;
      background: #F57C00;
      width: 0%;
      transition: width 0.3s;
    }
    .badge {
      background: #FEF0E6;
      padding: 4px 10px;
      border-radius: 30px;
      font-size: 0.8rem;
      color: #E65100;
    }
    .btn-primary {
      background: #E65100;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 40px;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      box-shadow: 0 6px 14px rgba(230,81,0,0.2);
      transition: 0.15s;
    }
    .btn-primary:hover { background: #bf4300; transform: scale(1.02); }
    .btn-outline {
      background: transparent;
      border: 1.5px solid #E0E0E0;
      padding: 12px 24px;
      border-radius: 40px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: 0.15s;
    }
    .btn-outline:hover { border-color: #F57C00; color: #E65100; }

    /* Dashboard Grid */
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
      margin-bottom: 32px;
    }
    .two-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 32px;
    }
    .week-bars {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      margin-top: 16px;
    }
    .bar-day { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .bar { width: 100%; background: #F57C00; border-radius: 12px 12px 8px 8px; min-height: 4px; transition: height 0.3s; }

    /* Modo Foco (tela cheia) */
    .focus-mode {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #F5F5F5;
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .focus-container {
      max-width: 600px;
      width: 100%;
      background: white;
      border-radius: 48px;
      padding: 48px;
      text-align: center;
      box-shadow: 0 30px 50px rgba(0,0,0,0.05);
    }
    .focus-timer {
      font-family: 'Poppins', monospace;
      font-size: 5rem;
      font-weight: 700;
      margin: 30px 0;
    }
    .focus-actions {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-top: 40px;
    }
    .focus-btn {
      width: 80px; height: 80px;
      border-radius: 40px;
      border: none;
      font-size: 2rem;
      cursor: pointer;
      transition: 0.15s;
    }
    .focus-btn.correct { background: #2E7D32; color: white; }
    .focus-btn.wrong { background: #C62828; color: white; }
    .focus-btn:hover { transform: scale(1.05); }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.2);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-card {
      background: white;
      border-radius: 32px;
      padding: 32px;
      width: 480px;
      box-shadow: 0 30px 40px rgba(0,0,0,0.1);
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #757575;
    }
    .empty-state i { font-size: 48px; color: #E0E0E0; margin-bottom: 20px; }
  </style>
</head>
<body>
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo-area">
      <div class="logo-icon">
        <img src="https://cdn-icons-png.flaticon.com/512/4193/4193312.png" alt="Raposa Vulpis" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
        <i class="fas fa-fox" style="display:none; font-size:28px;"></i>
      </div>
      <span class="logo-text">Vulpis Asset</span>
    </div>
    <div class="nav-menu">
      <div class="nav-item" data-page="dashboard"><i class="fas fa-th-large"></i> Dashboard</div>
      <div class="nav-item" data-page="disciplinas"><i class="fas fa-book-open"></i> Disciplinas</div>
      <div class="nav-item" data-page="questoes"><i class="fas fa-question-circle"></i> Questões</div>
      <div class="nav-item" data-page="desempenho"><i class="fas fa-chart-line"></i> Desempenho</div>
      <div class="nav-item" data-page="perfil"><i class="fas fa-user-circle"></i> Perfil</div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main" id="app-content"></div>

  <!-- MODAIS -->
  <div class="modal" id="disciplineModal">
    <div class="modal-card">
      <h3 style="font-family: Poppins;">Nova disciplina</h3>
      <input list="disciplinesDatalist" id="disciplineNameInput" placeholder="Ex: Direito Constitucional" style="width:100%; padding:14px; border-radius:20px; border:1px solid #E0E0E0; margin:16px 0;">
      <datalist id="disciplinesDatalist"></datalist>
      <div class="flex-buttons" style="display:flex; gap:12px; justify-content:flex-end;">
        <button class="btn-outline" id="cancelModal">Cancelar</button>
        <button class="btn-primary" id="saveDiscipline">Adicionar</button>
      </div>
    </div>
  </div>

  <div class="modal" id="topicModal">
    <div class="modal-card">
      <h3 style="font-family: Poppins;">Adicionar tópico</h3>
      <input type="text" id="topicNameInput" placeholder="Nome do tópico" style="width:100%; padding:14px; border-radius:20px; border:1px solid #E0E0E0; margin:16px 0;">
      <input type="hidden" id="currentDisciplineId">
      <div class="flex-buttons" style="display:flex; gap:12px; justify-content:flex-end;">
        <button class="btn-outline" id="cancelTopicModal">Cancelar</button>
        <button class="btn-primary" id="saveTopic">Adicionar</button>
      </div>
    </div>
  </div>

  <div class="modal" id="quickQuestionModal">
    <div class="modal-card">
      <h3 style="font-family: Poppins;">Registrar questão</h3>
      <select id="quickDisc" style="width:100%; padding:14px; border-radius:20px; border:1px solid #E0E0E0; margin:16px 0;">
        <option value="">Selecione a disciplina</option>
      </select>
      <select id="quickTopic" style="width:100%; padding:14px; border-radius:20px; border:1px solid #E0E0E0; margin-bottom:16px;" disabled>
        <option value="">Tópico (opcional)</option>
      </select>
      <div style="display:flex; gap:12px;">
        <button class="btn-primary" id="quickCorrect" style="flex:1;"><i class="fas fa-check"></i> Acertei</button>
        <button class="btn-primary" id="quickWrong" style="flex:1; background:#9E9E9E;"><i class="fas fa-times"></i> Errei</button>
      </div>
    </div>
  </div>

  <script>
    (function(){
      'use strict';
      // ---------- LISTA DAS 50 DISCIPLINAS ----------
      const DISCIPLINAS_PREDEF = [
        "Língua Portuguesa","Direito Constitucional","Direito Administrativo","Raciocínio Lógico-Matemático","Informática",
        "Direito Processual Civil","Direito Processual Penal","Direito Civil","Direito Penal","Direito do Trabalho",
        "Direito Processual do Trabalho","Legislação Especial","Administração Geral e Pública","AFO","Gestão de Pessoas",
        "Atualidades","Ética no Serviço Público","Direitos das Pessoas com Deficiência","Direito Eleitoral","Direito Previdenciário",
        "Direito Tributário","ECA","Direito Ambiental","Direito do Consumidor","Contabilidade Geral","Contabilidade Pública",
        "Auditoria Governamental","Noções de Estatística","Matemática Financeira","Arquivologia","Língua Inglesa",
        "Legislação Aduaneira","Direito Empresarial","Legislação Extravagante","Noções de Sustentabilidade","Direitos Humanos",
        "Acessibilidade","Economia e Finanças Públicas","Fluência em Dados","Ciência Política","Técnica Legislativa",
        "Regimento Interno","Tecnologia da Informação","Contabilidade de Custos","História e Geografia","Auditoria",
        "Noções de Perícia em Processo Civil","Comércio Internacional","Licitações e Contratos","Direito Processual do Trabalho"
      ];

      // ---------- ESTADO GLOBAL ----------
      let state = {
        disciplines: [],
        user: { name: 'Estudante Estratégico', dailyGoalHours: 4, weeklyGoalHours: 20 },
        questionsHistory: [],
        studySessions: [] // { date, disciplineId, topicId, seconds }
      };
      let nextId = 1;
      let timerInterval = null, timerSeconds = 0, timerRunning = false, activeDisciplineId = null;
      let currentPage = 'dashboard';
      let focusModeActive = false;
      let focusDisciplineId = null, focusTopicId = null;

      // ---------- INICIALIZAÇÃO ----------
      function loadFromStorage() {
        const saved = localStorage.getItem('vulpis_state');
        if(saved) {
          try { 
            const parsed = JSON.parse(saved); 
            state = { ...state, ...parsed }; 
            if(state.disciplines.length) nextId = Math.max(...state.disciplines.map(d=>d.id), 0) + 1;
            state.studySessions = state.studySessions || [];
          } catch(e){}
        }
        if(!state.disciplines.length) {
          state.disciplines = [
            { id: nextId++, name: 'Direito Constitucional', timeSeconds: 12600, questions: 240, correct: 182, wrong: 58, topics: [] },
            { id: nextId++, name: 'Raciocínio Lógico', timeSeconds: 8400, questions: 180, correct: 142, wrong: 38, topics: [] },
            { id: nextId++, name: 'Português', timeSeconds: 5400, questions: 120, correct: 98, wrong: 22, topics: [] }
          ];
        }
        state.disciplines.forEach(d => { d.topics = d.topics || []; d.expanded = false; });
      }
      function saveToStorage() { localStorage.setItem('vulpis_state', JSON.stringify(state)); }
      function formatTime(sec) {
        const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
        return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
      }
      function formatHoursMinutes(sec) { const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60); return `${h}h ${m}m`; }

      // ---------- RENDER PRINCIPAL ----------
      const contentDiv = document.getElementById('app-content');
      function renderPage(page) {
        if(focusModeActive) return;
        currentPage = page;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page === page));
        switch(page) {
          case 'dashboard': renderDashboard(); break;
          case 'disciplinas': renderDisciplinas(); break;
          case 'questoes': renderQuestoes(); break;
          case 'desempenho': renderDesempenho(); break;
          case 'perfil': renderPerfil(); break;
        }
      }

      // ---------- CRONOMETRO GLOBAL ----------
      function renderGlobalTimer() {
        return `
          <div class="global-timer" style="background:white; border-radius:24px; padding:16px 28px; display:flex; align-items:center; justify-content:space-between; margin-bottom:32px;">
            <div style="display:flex; align-items:center; gap:24px;">
              <select id="disciplineSelect" class="timer-select" style="padding:12px 20px; border-radius:40px; border:1.5px solid #E0E0E0;">
                <option value="">Selecione a disciplina</option>
                ${state.disciplines.map(d => `<option value="${d.id}">${d.name}</option>`).join('')}
              </select>
              <span class="timer-display" id="timerDisplay" style="font-family:Poppins; font-size:2rem; font-weight:600;">${formatTime(timerSeconds)}</span>
            </div>
            <div style="display:flex; gap:8px;">
              <button class="timer-btn" id="timerStart" style="background:#F5F5F5; border:none; width:48px; height:48px; border-radius:40px;"><i class="fas fa-play"></i></button>
              <button class="timer-btn" id="timerPause"><i class="fas fa-pause"></i></button>
              <button class="timer-btn" id="timerStop"><i class="fas fa-stop"></i></button>
            </div>
          </div>
        `;
      }
      function attachTimerEvents() {
        document.getElementById('timerStart')?.addEventListener('click', startTimer);
        document.getElementById('timerPause')?.addEventListener('click', pauseTimer);
        document.getElementById('timerStop')?.addEventListener('click', stopTimer);
        function startTimer() {
          const sel = document.getElementById('disciplineSelect'); if(!sel) return;
          const discId = parseInt(sel.value); if(!discId) { alert('Selecione uma disciplina'); return; }
          activeDisciplineId = discId; timerRunning = true;
          if(timerInterval) clearInterval(timerInterval);
          timerInterval = setInterval(() => { timerSeconds++; const disp = document.getElementById('timerDisplay'); if(disp) disp.textContent = formatTime(timerSeconds); }, 1000);
        }
        function pauseTimer() { clearInterval(timerInterval); timerRunning = false; }
        function stopTimer() {
          if(!activeDisciplineId) return;
          clearInterval(timerInterval); timerRunning = false;
          const disc = state.disciplines.find(d=>d.id === activeDisciplineId);
          if(disc) {
            if(disc.topics.length) { alert('Esta disciplina possui tópicos. Registre o tempo diretamente no tópico.'); }
            else { disc.timeSeconds = (disc.timeSeconds || 0) + timerSeconds; }
            // Registrar sessão
            const today = new Date().toISOString().split('T')[0];
            state.studySessions.push({ date: today, disciplineId: activeDisciplineId, seconds: timerSeconds });
          }
          timerSeconds = 0; document.getElementById('timerDisplay').textContent = '00:00:00';
          activeDisciplineId = null; saveToStorage();
          if(currentPage === 'dashboard') renderDashboard(); else if(currentPage === 'disciplinas') renderDisciplinas();
        }
      }

      // ---------- DASHBOARD (NOVO) ----------
      function renderDashboard() {
        const totalSec = state.disciplines.reduce((s,d)=> s + (d.topics.length ? d.topics.reduce((a,t)=>a+(t.timeSeconds||0),0) : (d.timeSeconds||0)), 0);
        const totalQ = state.disciplines.reduce((s,d)=> s + (d.topics.length ? d.topics.reduce((a,t)=>a+(t.questions||0),0) : (d.questions||0)), 0);
        const totalCorrect = state.disciplines.reduce((s,d)=> s + (d.topics.length ? d.topics.reduce((a,t)=>a+(t.correct||0),0) : (d.correct||0)), 0);
        const avgPercent = totalQ ? ((totalCorrect / totalQ)*100).toFixed(1) : '0.0';
        
        // Dados semanais (últimos 7 dias)
        const last7Days = [...Array(7)].map((_,i) => {
          const d = new Date(); d.setDate(d.getDate() - i);
          return d.toISOString().split('T')[0];
        }).reverse();
        const weekHours = last7Days.map(date => {
          const sessions = state.studySessions.filter(s => s.date === date);
          return sessions.reduce((sum, s) => sum + s.seconds, 0) / 3600;
        });
        const weekTotalHours = weekHours.reduce((a,b)=>a+b,0);
        const prevWeekHours = 15; // mock, poderia calcular com dados históricos
        const evolution = prevWeekHours ? ((weekTotalHours - prevWeekHours)/prevWeekHours*100).toFixed(0) : 0;

        // Pontos fracos (disciplinas com acerto < 60%)
        const weakDisciplines = state.disciplines.filter(d => {
          let q=0, c=0;
          if(d.topics.length) { d.topics.forEach(t => { q+=t.questions||0; c+=t.correct||0; }); }
          else { q=d.questions||0; c=d.correct||0; }
          return q>0 && (c/q) < 0.6;
        });

        // Insights
        const insights = [];
        if(weekTotalHours < state.user.weeklyGoalHours * 0.7) insights.push(`⏳ Você estudou ${weekTotalHours.toFixed(1)}h esta semana, abaixo da meta de ${state.user.weeklyGoalHours}h.`);
        if(weakDisciplines.length) insights.push(`📉 Reforce ${weakDisciplines.map(d=>d.name).join(', ')}.`);
        if(totalQ > 0 && avgPercent >= 70) insights.push(`🎯 Sua taxa de acerto geral está ótima (${avgPercent}%)!`);

        const html = `
          ${renderGlobalTimer()}
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
            <div>
              <div class="page-title">Olá, ${state.user.name.split(' ')[0]} 👋</div>
              <div class="greeting">Continue sua estratégia inteligente</div>
            </div>
            <div class="badge" style="padding:10px 20px; font-size:1rem;"><i class="fas fa-fire"></i> Streak: 7 dias</div>
          </div>

          <!-- Visão Geral -->
          <div class="dashboard-grid">
            <div class="card"><div class="card-header"><i class="fas fa-bullseye"></i> Taxa de acerto</div><div class="card-value">${avgPercent}%</div><div class="progress-bar"><div class="progress-fill" style="width:${avgPercent}%"></div></div></div>
            <div class="card"><div class="card-header"><i class="fas fa-clock"></i> Tempo semanal</div><div class="card-value">${weekTotalHours.toFixed(1)}h</div><div class="progress-bar"><div class="progress-fill" style="width:${(weekTotalHours/state.user.weeklyGoalHours)*100}%"></div></div><div class="card-label">Meta: ${state.user.weeklyGoalHours}h</div></div>
            <div class="card"><div class="card-header"><i class="fas fa-chart-line"></i> Evolução</div><div class="card-value" style="color:${evolution>=0?'#2E7D32':'#C62828'};">${evolution>0?'+':''}${evolution}%</div><div class="card-label">vs semana anterior</div></div>
            <div class="card"><div class="card-header"><i class="fas fa-calendar-check"></i> Meta semanal</div><div class="card-value">${Math.round(weekTotalHours/state.user.weeklyGoalHours*100)}%</div><div class="card-label">faltam ${(state.user.weeklyGoalHours - weekTotalHours).toFixed(1)}h</div></div>
          </div>

          <!-- Gráfico Semanal + Pontos Fracos -->
          <div class="two-cols">
            <div class="card">
              <div class="card-header"><i class="fas fa-chart-bar"></i> Horas estudadas (últimos 7 dias)</div>
              <div class="week-bars">
                ${last7Days.map((date,i) => {
                  const dayName = ['D','S','T','Q','Q','S','S'][new Date(date).getDay()];
                  return `<div class="bar-day"><div class="bar" style="height:${weekHours[i]*15}px;"></div><span>${dayName}</span><span style="font-size:0.7rem;">${weekHours[i].toFixed(1)}h</span></div>`;
                }).join('')}
              </div>
            </div>
            <div class="card" style="background:#FFF5F5; border-left:6px solid #C62828;">
              <div class="card-header"><i class="fas fa-exclamation-triangle" style="color:#C62828;"></i> Pontos de atenção</div>
              ${weakDisciplines.length ? weakDisciplines.map(d => {
                let q=0, c=0; if(d.topics.length) d.topics.forEach(t=>{ q+=t.questions||0; c+=t.correct||0; }); else { q=d.questions||0; c=d.correct||0; }
                return `<p>📌 ${d.name}: ${q} questões, ${((c/q)*100).toFixed(0)}% acerto</p>`;
              }).join('') : '<p>✅ Nenhum ponto crítico no momento.</p>'}
            </div>
          </div>

          <!-- Insights e Ações Rápidas -->
          <div class="two-cols">
            <div class="card insight-card" style="background:#FEF0E6; border-left:6px solid #E65100;">
              <div class="card-header"><i class="fas fa-lightbulb"></i> Insights inteligentes</div>
              ${insights.map(msg => `<p>💡 ${msg}</p>`).join('')}
              ${insights.length === 0 ? '<p>✨ Continue assim! Seu ritmo está excelente.</p>' : ''}
            </div>
            <div class="card">
              <div class="card-header"><i class="fas fa-play-circle"></i> Ações rápidas</div>
              <div style="display:flex; flex-direction:column; gap:12px;">
                <button class="btn-primary" id="continueStudyBtn"><i class="fas fa-play"></i> Continuar estudo (Modo Foco)</button>
                <button class="btn-outline" id="quickQuestionBtn"><i class="fas fa-plus-circle"></i> Registrar questão rápida</button>
                <button class="btn-outline" id="reviewWeakBtn"><i class="fas fa-book"></i> Revisar disciplina fraca</button>
              </div>
            </div>
          </div>
        `;
        contentDiv.innerHTML = html;
        attachTimerEvents();
        document.getElementById('continueStudyBtn')?.addEventListener('click', openFocusMode);
        document.getElementById('quickQuestionBtn')?.addEventListener('click', openQuickQuestionModal);
        document.getElementById('reviewWeakBtn')?.addEventListener('click', () => {
          if(weakDisciplines.length) {
            const firstWeak = weakDisciplines[0];
            openFocusModeWithDiscipline(firstWeak.id);
          } else alert('Nenhuma disciplina com baixo desempenho no momento.');
        });
      }

      // ---------- MODO FOCO ----------
      function openFocusMode() {
        const discId = activeDisciplineId || (state.disciplines[0]?.id || null);
        if(!discId) { alert('Adicione uma disciplina primeiro.'); return; }
        openFocusModeWithDiscipline(discId);
      }
      function openFocusModeWithDiscipline(discId) {
        focusDisciplineId = discId;
        focusTopicId = null;
        const disc = state.disciplines.find(d=>d.id === discId);
        if(disc && disc.topics.length) {
          // Se tiver tópicos, perguntar qual (simplificado: primeiro tópico)
          focusTopicId = disc.topics[0].id;
        }
        focusModeActive = true;
        let focusTimerSeconds = 0;
        let focusInterval = null;
        const focusHtml = `
          <div class="focus-mode" id="focusModeOverlay">
            <div class="focus-container">
              <button style="align-self:flex-end; background:none; border:none; font-size:1.5rem; cursor:pointer;" id="closeFocus"><i class="fas fa-times"></i></button>
              <h2>${disc.name} ${focusTopicId ? ' - ' + disc.topics.find(t=>t.id===focusTopicId).name : ''}</h2>
              <div class="focus-timer" id="focusTimerDisplay">00:00:00</div>
              <div style="display:flex; gap:16px; justify-content:center;">
                <button class="timer-btn play" id="focusStart"><i class="fas fa-play"></i></button>
                <button class="timer-btn" id="focusPause"><i class="fas fa-pause"></i></button>
                <button class="timer-btn" id="focusStop"><i class="fas fa-stop"></i></button>
              </div>
              <div class="focus-actions">
                <button class="focus-btn correct" id="focusCorrect"><i class="fas fa-check"></i></button>
                <button class="focus-btn wrong" id="focusWrong"><i class="fas fa-times"></i></button>
              </div>
              <p style="margin-top:20px; color:#757575;">Pressione ✅ ou ❌ a cada questão resolvida</p>
            </div>
          </div>
        `;
        document.body.insertAdjacentHTML('beforeend', focusHtml);
        const overlay = document.getElementById('focusModeOverlay');
        const timerDisplay = document.getElementById('focusTimerDisplay');
        
        document.getElementById('closeFocus').addEventListener('click', ()=>{ overlay.remove(); focusModeActive = false; });
        document.getElementById('focusStart').addEventListener('click', ()=>{
          if(focusInterval) clearInterval(focusInterval);
          focusInterval = setInterval(() => { focusTimerSeconds++; timerDisplay.textContent = formatTime(focusTimerSeconds); }, 1000);
        });
        document.getElementById('focusPause').addEventListener('click', ()=> clearInterval(focusInterval));
        document.getElementById('focusStop').addEventListener('click', ()=>{
          clearInterval(focusInterval);
          if(focusTimerSeconds > 0) {
            const disc = state.disciplines.find(d=>d.id === focusDisciplineId);
            if(disc) {
              if(focusTopicId) {
                const topic = disc.topics.find(t=>t.id === focusTopicId);
                if(topic) topic.timeSeconds = (topic.timeSeconds||0) + focusTimerSeconds;
              } else {
                if(!disc.topics.length) disc.timeSeconds = (disc.timeSeconds||0) + focusTimerSeconds;
              }
              const today = new Date().toISOString().split('T')[0];
              state.studySessions.push({ date: today, disciplineId: focusDisciplineId, topicId: focusTopicId, seconds: focusTimerSeconds });
              saveToStorage();
            }
          }
          overlay.remove(); focusModeActive = false;
          if(currentPage === 'dashboard') renderDashboard();
        });
        function registerFocusQuestion(correct) {
          const disc = state.disciplines.find(d=>d.id === focusDisciplineId);
          if(!disc) return;
          if(focusTopicId) {
            const topic = disc.topics.find(t=>t.id === focusTopicId);
            if(topic) {
              topic.questions = (topic.questions||0)+1;
              if(correct) topic.correct = (topic.correct||0)+1; else topic.wrong = (topic.wrong||0)+1;
            }
          } else {
            if(disc.topics.length) { alert('Selecione um tópico primeiro.'); return; }
            disc.questions = (disc.questions||0)+1;
            if(correct) disc.correct = (disc.correct||0)+1; else disc.wrong = (disc.wrong||0)+1;
          }
          recordQuestionHistory(focusDisciplineId, focusTopicId, correct);
          saveToStorage();
          // feedback visual simples
          const btn = correct ? document.getElementById('focusCorrect') : document.getElementById('focusWrong');
          btn.style.transform = 'scale(0.9)'; setTimeout(()=> btn.style.transform = '', 100);
        }
        document.getElementById('focusCorrect').addEventListener('click', ()=> registerFocusQuestion(true));
        document.getElementById('focusWrong').addEventListener('click', ()=> registerFocusQuestion(false));
      }

      function recordQuestionHistory(discId, topicId, correct) {
        const today = new Date().toISOString().split('T')[0];
        state.questionsHistory.push({ date: today, disciplineId: discId, topicId, correct });
      }

      // ---------- REGISTRO RÁPIDO DE QUESTÕES ----------
      function openQuickQuestionModal() {
        const modal = document.getElementById('quickQuestionModal');
        const discSelect = document.getElementById('quickDisc');
        const topicSelect = document.getElementById('quickTopic');
        discSelect.innerHTML = '<option value="">Selecione a disciplina</option>' + state.disciplines.map(d => `<option value="${d.id}">${d.name}</option>`).join('');
        topicSelect.innerHTML = '<option value="">Tópico (opcional)</option>';
        topicSelect.disabled = true;
        discSelect.onchange = () => {
          const discId = parseInt(discSelect.value);
          const disc = state.disciplines.find(d=>d.id===discId);
          topicSelect.innerHTML = '<option value="">Tópico (opcional)</option>';
          if(disc && disc.topics.length) {
            disc.topics.forEach(t => topicSelect.innerHTML += `<option value="${t.id}">${t.name}</option>`);
            topicSelect.disabled = false;
          } else {
            topicSelect.disabled = true;
          }
        };
        modal.style.display = 'flex';
        
        const register = (correct) => {
          const discId = parseInt(discSelect.value);
          if(!discId) { alert('Selecione a disciplina'); return; }
          const topicId = topicSelect.value ? parseInt(topicSelect.value) : null;
          const disc = state.disciplines.find(d=>d.id===discId);
          if(topicId) {
            const topic = disc.topics.find(t=>t.id===topicId);
            if(topic) {
              topic.questions = (topic.questions||0)+1;
              if(correct) topic.correct = (topic.correct||0)+1; else topic.wrong = (topic.wrong||0)+1;
            }
          } else {
            if(disc.topics.length) { alert('Esta disciplina possui tópicos. Selecione um tópico.'); return; }
            disc.questions = (disc.questions||0)+1;
            if(correct) disc.correct = (disc.correct||0)+1; else disc.wrong = (disc.wrong||0)+1;
          }
          recordQuestionHistory(discId, topicId, correct);
          saveToStorage();
          modal.style.display = 'none';
          if(currentPage === 'dashboard') renderDashboard();
        };
        document.getElementById('quickCorrect').onclick = (e) => { e.preventDefault(); register(true); };
        document.getElementById('quickWrong').onclick = (e) => { e.preventDefault(); register(false); };
        window.addEventListener('click', (e) => { if(e.target === modal) modal.style.display='none'; });
      }

      // ---------- PLANO DE ESTUDO SIMPLIFICADO (na página Disciplinas) ----------
      function generateStudyPlan() {
        const availableHours = parseFloat(prompt('Quantas horas você tem disponível por dia?', '3'));
        if(!availableHours) return;
        const disciplinesToStudy = state.disciplines.filter(d => {
          let q=0, c=0; if(d.topics.length) d.topics.forEach(t=>{ q+=t.questions||0; c+=t.correct||0; }); else { q=d.questions||0; c=d.correct||0; }
          return q>0;
        }).sort((a,b) => {
          let qa=0, ca=0; if(a.topics.length) a.topics.forEach(t=>{ qa+=t.questions||0; ca+=t.correct||0; }); else { qa=a.questions||0; ca=a.correct||0; }
          let qb=0, cb=0; if(b.topics.length) b.topics.forEach(t=>{ qb+=t.questions||0; cb+=t.correct||0; }); else { qb=b.questions||0; cb=b.correct||0; }
          return (ca/qa) - (cb/qb); // pior desempenho primeiro
        });
        let planHtml = `<h3>Plano sugerido (${availableHours}h/dia)</h3><ol>`;
        disciplinesToStudy.slice(0,5).forEach(d => planHtml += `<li>${d.name} - ${(availableHours/2).toFixed(1)}h</li>`);
        planHtml += '</ol><p>Distribua o tempo restante para revisões.</p>';
        const planDiv = document.createElement('div');
        planDiv.className = 'card'; planDiv.style.marginTop = '24px';
        planDiv.innerHTML = planHtml;
        const container = document.querySelector('.disciplines-table');
        if(container) container.insertAdjacentElement('afterend', planDiv);
      }

      // ---------- DISCIPLINAS (com botão de plano) ----------
      function renderDisciplinas() {
        const html = `
          ${renderGlobalTimer()}
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <div><div class="page-title">Disciplinas</div><div class="greeting">Gerencie suas matérias e tópicos</div></div>
            <div style="display:flex; gap:12px;">
              <button class="btn-outline" id="generatePlanBtn"><i class="fas fa-magic"></i> Gerar plano inteligente</button>
              <button class="btn-primary" id="addDisciplineBtn"><i class="fas fa-plus-circle"></i> Adicionar disciplina</button>
            </div>
          </div>
          <div class="disciplines-table">
            <div class="table-header"><span>Disciplina</span><span>Tempo</span><span>Questões</span><span>Certas</span><span>Erradas</span><span>% Acerto</span><span>Ações</span></div>
            <div id="disciplinesList"></div>
          </div>
        `;
        contentDiv.innerHTML = html;
        renderDisciplinesList();
        attachTimerEvents();
        document.getElementById('addDisciplineBtn').addEventListener('click', openDisciplineModal);
        document.getElementById('generatePlanBtn').addEventListener('click', generateStudyPlan);
      }
      function renderDisciplinesList() {
        const container = document.getElementById('disciplinesList');
        let rows = '';
        state.disciplines.forEach(disc => {
          let t=0, q=0, c=0, w=0;
          if(disc.topics.length) { disc.topics.forEach(tp => { t+=tp.timeSeconds||0; q+=tp.questions||0; c+=tp.correct||0; w+=tp.wrong||0; }); }
          else { t=disc.timeSeconds||0; q=disc.questions||0; c=disc.correct||0; w=disc.wrong||0; }
          const percent = q ? ((c/q)*100).toFixed(1) : '0.0';
          rows += `<div class="discipline-row" data-id="${disc.id}">
            <div class="discipline-name"><button class="expand-btn" data-id="${disc.id}"><i class="fas fa-chevron-${disc.expanded ? 'down' : 'right'}"></i></button><span>${disc.name}</span>${disc.topics.length?`<span class="badge">${disc.topics.length} tópicos</span>`:''}</div>
            <div>${formatHoursMinutes(t)}</div><div>${q}</div><div>${c}</div><div>${w}</div>
            <div style="display:flex; align-items:center; gap:8px;"><span>${percent}%</span><div class="percentage-bar"><div class="percentage-fill" style="width:${percent}%"></div></div></div>
            <div class="actions">
              <i class="fas fa-plus-circle" data-action="addCorrect" data-id="${disc.id}"></i><i class="fas fa-minus-circle" data-action="addWrong" data-id="${disc.id}"></i>
              <i class="fas fa-layer-group" data-action="addTopic" data-id="${disc.id}"></i><i class="fas fa-edit" data-action="editDisc" data-id="${disc.id}"></i><i class="fas fa-trash-alt" data-action="deleteDisc" data-id="${disc.id}"></i>
            </div>
          </div>`;
          if(disc.expanded && disc.topics.length) {
            disc.topics.forEach(topic => {
              const tp = topic.questions ? ((topic.correct/topic.questions)*100).toFixed(1) : '0.0';
              rows += `<div class="topic-row">
                <div style="display:flex; gap:10px;"><i class="far fa-file-alt"></i> ${topic.name}</div><div>${formatHoursMinutes(topic.timeSeconds||0)}</div><div>${topic.questions||0}</div><div>${topic.correct||0}</div><div>${topic.wrong||0}</div>
                <div style="display:flex; align-items:center; gap:8px;"><span>${tp}%</span><div class="percentage-bar"><div class="percentage-fill" style="width:${tp}%"></div></div></div>
                <div class="actions">
                  <i class="fas fa-plus-circle" data-action="topicCorrect" data-disc="${disc.id}" data-topic="${topic.id}"></i><i class="fas fa-minus-circle" data-action="topicWrong" data-disc="${disc.id}" data-topic="${topic.id}"></i>
                  <i class="fas fa-edit" data-action="editTopic" data-disc="${disc.id}" data-topic="${topic.id}"></i><i class="fas fa-trash-alt" data-action="deleteTopic" data-disc="${disc.id}" data-topic="${topic.id}"></i>
                </div>
              </div>`;
            });
          }
        });
        container.innerHTML = rows || '<div class="empty-state"><i class="fas fa-book-open"></i><h3>Nenhuma disciplina</h3><p>Adicione sua primeira disciplina para começar.</p></div>';
        attachDisciplineActions();
      }
      function attachDisciplineActions() {
        document.querySelectorAll('[data-action]').forEach(el => el.addEventListener('click', handleDisciplineAction));
        document.querySelectorAll('.expand-btn').forEach(btn => btn.addEventListener('click', (e) => {
          const id = parseInt(btn.dataset.id); const disc = state.disciplines.find(d=>d.id===id);
          if(disc) { disc.expanded = !disc.expanded; renderDisciplinesList(); }
        }));
      }
      function handleDisciplineAction(e) {
        const target = e.target.closest('i'); if(!target) return;
        const action = target.dataset.action; const discId = parseInt(target.dataset.id || target.dataset.disc);
        const topicId = target.dataset.topic ? parseInt(target.dataset.topic) : null;
        const discipline = state.disciplines.find(d => d.id === discId); if(!discipline) return;
        if(action === 'addCorrect' || action === 'addWrong') {
          if(discipline.topics.length) { alert('Adicione questões nos tópicos.'); return; }
          discipline.questions = (discipline.questions||0)+1;
          if(action==='addCorrect') discipline.correct = (discipline.correct||0)+1; else discipline.wrong = (discipline.wrong||0)+1;
          recordQuestionHistory(discId, null, action==='addCorrect');
          saveToStorage(); renderDisciplinesList();
        } else if(action === 'topicCorrect' || action === 'topicWrong') {
          const topic = discipline.topics.find(t=>t.id===topicId);
          if(topic) {
            topic.questions = (topic.questions||0)+1;
            if(action==='topicCorrect') topic.correct = (topic.correct||0)+1; else topic.wrong = (topic.wrong||0)+1;
            recordQuestionHistory(discId, topicId, action==='topicCorrect');
            saveToStorage(); renderDisciplinesList();
          }
        } else if(action === 'addTopic') openTopicModal(discId);
        else if(action === 'editDisc') { const newName = prompt('Novo nome:', discipline.name); if(newName) { discipline.name = newName; saveToStorage(); renderDisciplinesList(); } }
        else if(action === 'deleteDisc') { if(confirm('Excluir disciplina?')) { state.disciplines = state.disciplines.filter(d=>d.id !== discId); saveToStorage(); renderDisciplinesList(); } }
        else if(action === 'editTopic') { const topic = discipline.topics.find(t=>t.id===topicId); const newName = prompt('Nome do tópico:', topic.name); if(newName) { topic.name = newName; saveToStorage(); renderDisciplinesList(); } }
        else if(action === 'deleteTopic') { discipline.topics = discipline.topics.filter(t=>t.id !== topicId); saveToStorage(); renderDisciplinesList(); }
      }

      // ---------- OUTRAS PÁGINAS (mantidas simplificadas) ----------
      function renderQuestoes() { /* similar ao anterior, com registro rápido */ }
      function renderDesempenho() { /* gráficos simples */ }
      function renderPerfil() { 
        const html = `
          <div class="page-title">Perfil</div>
          <div class="card">
            <div class="card-header"><i class="fas fa-user-circle"></i> ${state.user.name}</div>
            <p><strong>Meta semanal:</strong> ${state.user.weeklyGoalHours}h</p>
            <button class="btn-primary" id="editWeeklyGoal">Editar meta semanal</button>
          </div>
        `;
        contentDiv.innerHTML = html;
        document.getElementById('editWeeklyGoal').addEventListener('click', ()=>{
          const newGoal = prompt('Nova meta semanal (horas):', state.user.weeklyGoalHours);
          if(newGoal) { state.user.weeklyGoalHours = parseFloat(newGoal); saveToStorage(); renderPerfil(); }
        });
      }

      // Modais e inicialização (repetidos para funcionar)
      const modalDisc = document.getElementById('disciplineModal'), modalTopic = document.getElementById('topicModal');
      function openDisciplineModal() { document.getElementById('disciplineNameInput').value = ''; modalDisc.style.display = 'flex'; }
      function openTopicModal(discId) { document.getElementById('currentDisciplineId').value = discId; document.getElementById('topicNameInput').value = ''; modalTopic.style.display = 'flex'; }
      document.getElementById('cancelModal').addEventListener('click', ()=> modalDisc.style.display='none');
      document.getElementById('saveDiscipline').addEventListener('click', ()=>{
        const name = document.getElementById('disciplineNameInput').value.trim(); if(name) { state.disciplines.push({ id: nextId++, name, timeSeconds:0, questions:0, correct:0, wrong:0, topics:[], expanded:false }); saveToStorage(); if(currentPage==='disciplinas') renderDisciplinas(); modalDisc.style.display='none'; }
      });
      document.getElementById('cancelTopicModal').addEventListener('click', ()=> modalTopic.style.display='none');
      document.getElementById('saveTopic').addEventListener('click', ()=>{
        const name = document.getElementById('topicNameInput').value.trim(); const discId = parseInt(document.getElementById('currentDisciplineId').value); const disc = state.disciplines.find(d=>d.id===discId);
        if(name && disc) { disc.topics.push({ id: Date.now(), name, timeSeconds:0, questions:0, correct:0, wrong:0 }); disc.expanded = true; saveToStorage(); if(currentPage==='disciplinas') renderDisciplinas(); modalTopic.style.display='none'; }
      });
      window.addEventListener('click', (e) => { if(e.target === modalDisc) modalDisc.style.display='none'; if(e.target === modalTopic) modalTopic.style.display='none'; });
      const datalist = document.getElementById('disciplinesDatalist'); DISCIPLINAS_PREDEF.forEach(name => { const opt = document.createElement('option'); opt.value = name; datalist.appendChild(opt); });
      
      // Navegação
      document.querySelectorAll('.nav-item').forEach(item => item.addEventListener('click', () => renderPage(item.dataset.page)));
      
      // Inicialização
      loadFromStorage();
      renderPage('dashboard');
    })();
  </script>
</body>
